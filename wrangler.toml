# Cloudflare Pages config for Liga Amistades.
# The site is a single static index.html at the repo root, with a Pages Function
# under /functions/api that talks to Workers KV.

name = "liga-amistades"
pages_build_output_dir = "."
compatibility_date = "2024-11-01"

# KV namespace holding the league data. Replace `id` with the namespace id from:
#   npx wrangler kv namespace create LIGA_KV
# (For git-connected Pages you can instead set this binding in the dashboard:
#  Settings → Functions → KV namespace bindings → variable name LIGA_KV.)
[[kv_namespaces]]
binding = "LIGA_KV"
id = "b68282b1c59c4f6e94ce2a7b093d0f93"
